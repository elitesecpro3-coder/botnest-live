<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotNest | Payment Successful</title>
  <meta name="description" content="Your BotNest payment was successful and your assistant is being activated." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .status-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 96px 0;
    }

    .status-panel {
      width: min(680px, 92vw);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      padding: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
      color: #f8d97d;
      background: rgba(242, 191, 58, 0.14);
      border: 1px solid rgba(242, 191, 58, 0.38);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-panel h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 12px;
    }

    .status-panel p {
      max-width: 52ch;
      margin: 0 auto;
    }

    .status-card {
      margin: 26px auto 28px;
      padding: 18px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: left;
    }

    .status-label {
      display: block;
      margin-bottom: 6px;
      color: var(--secondary);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-value {
      color: var(--text);
      font-weight: 700;
      word-break: break-word;
    }

    .status-actions {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="page-glow page-glow-top"></div>
  <div class="page-glow page-glow-bottom"></div>

  <main class="status-shell">
    <section class="status-panel">
      <div class="status-badge">Payment Confirmed</div>
      <h1>Payment successful. Your BotNest assistant is being activated.</h1>
      <p>Your subscription is confirmed. We are now finalizing your assistant setup and webhook activation.</p>

      <div class="status-card" aria-live="polite">
        <span class="status-label">Status</span>
        <div class="status-value" id="status-text">Waiting for activation details...</div>
      </div>

      <div class="status-actions">
        <a href="../index.html" class="btn btn-primary">Back to Homepage</a>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    const statusText = document.getElementById('status-text');

    if (statusText) {
      statusText.textContent = sessionId
        ? 'Stripe session: ' + sessionId
        : 'Stripe session ID not found. Your payment may still be processing.';
    }
  </script>
</body>
</html>
